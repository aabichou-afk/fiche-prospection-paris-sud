<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM · Paris Sud — Pilotage complet</title>
<link rel="stylesheet" href="style.css">
<script src="gate.js"></script>
<style>
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:2px 0 16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:15px;padding:13px 15px;box-shadow:0 6px 18px -14px rgba(17,54,43,.5)}
.kpi .v{font-family:var(--serif);font-size:1.7rem;font-weight:700;color:var(--primary);line-height:1}
.kpi .l{font-size:.76rem;color:var(--muted);margin-top:3px}
.crmbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.crmtab{border:1px solid #d7e5dd;background:#fff;color:#1f6f5c;border-radius:999px;padding:9px 16px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;gap:.4rem;align-items:center}
.crmtab.on{background:#11362b;color:#fff;border-color:#11362b}.crmtab .b{background:#1f8a5c;color:#fff;border-radius:999px;font-size:.72rem;padding:1px 7px}.crmtab.on .b{background:#8cc63f;color:#11362b}
.me{margin-left:auto;display:flex;gap:6px;align-items:center;font-size:.82rem;color:var(--muted)}
.me select{padding:7px 10px;border:1px solid #d7e5dd;border-radius:9px;font-family:inherit;min-height:0;width:auto}
.toolrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.search{flex:1;min-width:180px;padding:11px 14px;border:1px solid #d7e5dd;border-radius:12px;font-size:.95rem;font-family:inherit}
.selctrl{padding:11px 12px;border:1px solid #d7e5dd;border-radius:12px;font-family:inherit;font-size:.88rem;min-height:0;width:auto;background:#fff}
.btnadd{background:#1f8a5c;color:#fff;border:none;border-radius:999px;padding:11px 18px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem}
.btncfg{background:#fff;border:1px solid #d7e5dd;border-radius:999px;padding:11px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem;color:#33453d}
.vtog{display:inline-flex;border:1px solid #d7e5dd;border-radius:999px;overflow:hidden}
.vtog button{border:none;background:#fff;padding:10px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.86rem;color:#5f6b62}
.vtog button.on{background:#11362b;color:#fff}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1px solid #d7e5dd;background:#fff;color:#4a5a52;border-radius:999px;padding:6px 13px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit}
.chip.on{background:#1f8a5c;color:#fff;border-color:#1f8a5c}
.conn{font-size:.78rem;padding:4px 11px;border-radius:999px;font-weight:700}.conn.live{background:#e3f5ea;color:#1f7a4d}.conn.demo{background:#fdf3df;color:#9a7212}
.card2{background:#fff;border:1px solid #e6ebe8;border-radius:16px;padding:14px 16px;margin-bottom:11px;box-shadow:0 6px 18px -14px rgba(17,54,43,.5);transition:.12s;cursor:pointer}
.card2:hover{box-shadow:0 14px 30px -18px rgba(17,54,43,.55);transform:translateY(-1px)}
.r1{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.r1 .nm{font-weight:700;color:#11362b;font-size:1.02rem}.r1 .sub{font-size:.82rem;color:#5f6b62}
.acts{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.ic{width:38px;height:38px;border-radius:10px;border:1px solid #e0e8e4;background:#fff;display:grid;place-items:center;cursor:pointer;font-size:1.05rem;text-decoration:none;transition:.12s}
.ic:hover{transform:translateY(-1px);border-color:#1f8a5c}
.ic.wa{background:#e9fbf0;border-color:#b9eccb}.ic.tel{background:#eaf3ff;border-color:#bcd8f7}.ic.ai{background:#f3ecff;border-color:#d8c4f5}
.r2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:11px}
.r2 select{padding:7px 10px;border:1px solid #dbe6e0;border-radius:9px;font-size:.84rem;font-family:inherit;background:#fff;min-height:0;width:auto}
.chk{display:inline-flex;gap:5px;align-items:center;font-size:.84rem;font-weight:600;color:#33453d;cursor:pointer}.chk input{width:18px;height:18px;min-height:0;accent-color:#1f8a5c}
.savepill{font-size:.72rem;color:#1f8a5c;font-weight:700;opacity:0;transition:.2s}.savepill.show{opacity:1}
.tagpill{font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:999px;background:#eef1ef;color:#4a5a52}
/* kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kcol{flex:1;min-width:230px;background:#f4f7f5;border:1px solid #e6ebe8;border-radius:14px;padding:10px}
.kcol h4{font-size:.82rem;color:#11362b;margin:2px 4px 8px;display:flex;justify-content:space-between}
.kcol h4 span{background:#fff;border-radius:999px;padding:0 8px;color:#5f6b62}
.kc{background:#fff;border:1px solid #e6ebe8;border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:0 4px 12px -10px rgba(17,54,43,.5)}
.kc .knm{font-weight:700;color:#11362b;font-size:.9rem}.kc .ksub{font-size:.76rem;color:#5f6b62}
.kc .kacts{display:flex;gap:5px;margin-top:7px}
/* drawer */
.drawer{position:fixed;top:0;right:-460px;width:440px;max-width:94vw;height:100dvh;background:#fff;box-shadow:-14px 0 40px -16px rgba(0,0,0,.4);z-index:210;transition:right .25s ease;overflow-y:auto;padding:22px}
.drawer.on{right:0}
.drawer .x{position:absolute;top:14px;right:16px;font-size:1.4rem;cursor:pointer;color:#8a978f;background:none;border:none}
.drawer h3{margin:0 6px 4px 0;color:#11362b;font-size:1.3rem;padding-right:30px}
.drawer .dsub{color:#5f6b62;font-size:.85rem;margin-bottom:12px}
.dact{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.drawer label{display:block;font-size:.74rem;color:#8a978f;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin:11px 0 3px}
.drawer input,.drawer select,.drawer textarea{width:100%;padding:10px 12px;border:1px solid #dbe6e0;border-radius:10px;font-family:inherit;font-size:.92rem}
.notehist{font-size:.82rem;color:#5f6b62;background:#f6f9f7;border-radius:9px;padding:9px 12px;margin-top:6px;white-space:pre-wrap;max-height:180px;overflow:auto}
.overlay{position:fixed;inset:0;background:rgba(17,54,43,.5);display:none;place-items:center;z-index:220;padding:16px}.overlay.on{display:grid}
.modal{background:#fff;border-radius:18px;padding:22px;max-width:460px;width:100%;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);max-height:88vh;overflow:auto}
.modal h3{margin:0 0 12px;color:#11362b}.modal label{display:block;font-size:.78rem;color:#5f6b62;font-weight:600;margin:9px 0 3px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid #dbe6e0;border-radius:10px;font-family:inherit;font-size:.92rem}
.modal .go{margin-top:14px;display:flex;gap:9px}.modal .go button{flex:1;border:none;border-radius:999px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit}
.modal .go .ok{background:#1f8a5c;color:#fff}.modal .go .no{background:#eee;color:#333}
.empty{text-align:center;color:#8a978f;padding:40px 10px}
.drto{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#11362b;color:#fff;padding:11px 18px;border-radius:12px;z-index:300;font-size:.9rem;box-shadow:0 12px 30px -10px rgba(0,0,0,.5)}
</style>
</head><body data-page="crm">
<div class="app">
  <aside class="side" id="side"></aside><div class="scrim" id="scrim"></div>
  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <h1>CRM — Pilotage</h1><span class="conn demo" id="conn">Aperçu</span>
    </div>
    <div class="content">
      <div class="crmbar" id="tabs"></div>
      <div class="kpis" id="kpis"></div>
      <div class="toolrow">
        <input class="search" id="search" placeholder="🔎 Rechercher…">
        <select class="selctrl" id="sort"></select>
        <span class="vtog"><button data-v="list" class="on">☰ Liste</button><button data-v="kanban">▦ Kanban</button></span>
        <button class="btnadd" id="add">➕ Ajouter</button>
        <button class="btncfg" id="cfg">⚙️</button>
      </div>
      <div class="chips" id="chips"></div>
      <div id="list"></div>
    </div>
  </div>
</div>
<div class="drawer" id="drawer"></div>
<div class="overlay" id="ov"><div class="modal" id="modal"></div></div>

<script src="nav.js"></script>
<script>
/* ============ config ============ */
var CFG={api:localStorage.getItem('crm_api')||'https://psf-crm-proxy.vercel.app/api/records',key:localStorage.getItem('crm_key')||''};
var LIVE=!!(CFG.api&&CFG.key);
var ME=localStorage.getItem('crm_me')||'';
var TABS={
 prospects:{table:'Prospects',label:'📞 Prospects',snap:'prospects',view:'list',
   cols:{nom:'nom',tel:'telephone',email:'email',dirigeant:'dirigeants',ville:'ville',statut:'Statut prospection',interet:'Intérêt',appele:'Appelé',appelePar:'Appelé par',agent:'Agent',notes:'Notes prospect'},
   statutOpts:['À appeler','À rappeler','RDV pris','Pas intéressé','Injoignable','Client signé'],
   interetOpts:['🔥 Intéressé','🟡 À relancer','❄️ Pas intéressé','📵 Injoignable','❌ Faux numéro / hors cible'],
   agentOpts:['Agente 1','Agente 2','Abdel','Souleyman'],
   kanban:'statut'},
 contrats:{table:'Contrats',label:'📁 Contrats',snap:'contrats',view:'list',
   cols:{apprenant:'Apprenant',entreprise:'Entreprise',statut:'Statut',financeur:'Financeur',montant:'Montant convention',note:'Blocage / note'},
   statutOpts:['📝 À saisir','⏳ Envoyé entreprise','🟠 Corrections','⚠️ Bloqué','✅ Signé'],
   financeurOpts:["OPCO Mobilités","AKTO","Op'Commerce","OPCO EP","ATLAS","POEI"],
   kanban:'statut'},
 taches:{table:'Taches',label:'✅ Tâches',snap:'taches',view:'list',
   cols:{tache:'Tâche',assigne:'Assigné à',statut:'Statut',priorite:'Priorité',dossier:'Dossier lié',notes:'Notes'},
   assigneOpts:['Abdel','Souleyman','Agente 1','Agente 2','Amine','Non assigné'],
   statutOpts:['🔴 À faire','🟠 En cours','⏸ En attente','✅ Fait'],
   prioriteOpts:['🔥 Haute','🟠 Moyenne','🟡 Basse'],
   kanban:'statut'}
};
var cur='prospects',SNAP=null,DATA={},filter='',chip='',sortBy='';
var $=function(s){return document.querySelector(s)};
function setConn(){var c=$('#conn');if(LIVE){c.className='conn live';c.textContent='● Live';}else{c.className='conn demo';c.textContent='Aperçu';}}
setConn();
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function waNum(t){if(!t)return'';var n=String(t).replace(/[^0-9+]/g,'');if(n.indexOf('+')===0)return n.slice(1);if(n.indexOf('00')===0)return n.slice(2);if(n[0]==='0')return '33'+n.slice(1);return n;}
function today(){var d=new Date();return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);}
function opt(list,val){return list.map(function(o){return '<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>'}).join('');}

/* ============ données ============ */
function loadSnap(){return fetch('crm_snapshot.json?cb='+Date.now()).then(function(r){return r.json()}).then(function(j){SNAP=j;});}
function apic(method,payload,q){var opt={method:method,headers:{'x-crm-key':CFG.key}};if(payload){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(payload);}
  return fetch(CFG.api+(q||''),opt).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||r.status);return j;});});}
function fetchTab(tab){var T=TABS[tab];
  if(LIVE)return apic('GET',null,'?table='+T.table+'&max=900').then(function(j){return (j.records||[]).map(function(r){var o={id:r.id};for(var k in T.cols){var v=r.fields[T.cols[k]];o[k]=(v&&v.name)?v.name:v;}return o;});});
  return Promise.resolve((SNAP&&SNAP[T.snap])?SNAP[T.snap].slice():[]);}
function refresh(){$('#list').innerHTML='<div class="empty">Chargement…</div>';fetchTab(cur).then(function(rows){DATA[cur]=rows;render();}).catch(function(e){$('#list').innerHTML='<div class="empty">Erreur: '+esc(e.message)+'</div>';});}
function save(id,fieldName,value,pill){if(!LIVE){toast('⚠️ Connecte le CRM (⚙️) pour enregistrer');return Promise.reject();}
  var fields={};fields[fieldName]=value;var rec=(DATA[cur]||[]).filter(function(r){return r.id===id})[0];if(rec){var fk=Object.keys(TABS[cur].cols).filter(function(k){return TABS[cur].cols[k]===fieldName})[0];if(fk)rec[fk]=value;}
  return apic('PATCH',{table:TABS[cur].table,id:id,fields:fields}).then(function(){if(pill){pill.classList.add('show');setTimeout(function(){pill.classList.remove('show')},1400);}computeKpis();});}
function createRow(table,fields){return apic('POST',{table:table,fields:fields});}
function toast(m){var t=document.createElement('div');t.className='drto';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2600);}

/* ============ filtres/tri ============ */
var CHIPS={
 prospects:[['','Tous'],['me','Mes fiches'],['À appeler','À appeler'],['À rappeler','À rappeler'],['non','Non appelés'],['🔥','🔥 Intéressés'],['RDV pris','RDV pris']],
 contrats:[['','Tous'],['⚠️ Bloqué','🔴 Bloqués'],['✅ Signé','Signés'],['📝 À saisir','À saisir']],
 taches:[['','Toutes'],['me','Les miennes'],['🔴 À faire','À faire'],['🟠 En cours','En cours'],['🔥 Haute','Prioritaires'],['✅ Fait','Faites']]
};
var SORTS={prospects:['Nom A-Z','Ville','Statut'],contrats:['Apprenant','Montant ↓','Statut'],taches:['Priorité','Statut','Assigné']};
function applyFilterSort(rows){var T=TABS[cur];
  if(chip){rows=rows.filter(function(r){
    if(chip==='me')return (r.appelePar===ME||r.agent===ME||r.assigne===ME);
    if(chip==='non')return !r.appele;
    if(chip==='🔥')return (r.interet||'').indexOf('🔥')>-1;
    return r.statut===chip||r.priorite===chip;
  });}
  if(filter){var f=filter.toLowerCase();rows=rows.filter(function(r){return Object.keys(T.cols).some(function(k){return (r[k]!=null)&&String(r[k]).toLowerCase().indexOf(f)>-1;});});}
  if(sortBy){rows=rows.slice().sort(function(a,b){
    if(sortBy==='Montant ↓')return (b.montant||0)-(a.montant||0);
    var ka=({'Nom A-Z':'nom','Ville':'ville','Statut':'statut','Apprenant':'apprenant','Priorité':'priorite','Assigné':'assigne'})[sortBy]||'nom';
    return String(a[ka]||'').localeCompare(String(b[ka]||''));
  });}
  return rows;
}

/* ============ KPI ============ */
function computeKpis(){var rows=DATA[cur]||[],h='';
  if(cur==='prospects'){var ap=rows.filter(function(r){return r.appele}).length,it=rows.filter(function(r){return (r.interet||'').indexOf('🔥')>-1}).length,rd=rows.filter(function(r){return r.statut==='RDV pris'}).length,rap=rows.filter(function(r){return r.statut==='À rappeler'}).length;
    h=kpi(rows.length,'Prospects')+kpi(ap,'Appelés')+kpi(it,'🔥 Intéressés')+kpi(rap,'À rappeler')+kpi(rd,'RDV pris');}
  else if(cur==='contrats'){var sig=rows.filter(function(r){return r.statut==='✅ Signé'}),bl=rows.filter(function(r){return r.statut==='⚠️ Bloqué'}).length;var eur=sig.reduce(function(a,r){return a+(Number(r.montant)||0)},0);
    h=kpi(rows.length,'Contrats')+kpi(sig.length,'Signés')+kpi(eur.toLocaleString('fr-FR')+' €','Montant signé')+kpi(bl,'🔴 Bloqués');}
  else{var af=rows.filter(function(r){return r.statut==='🔴 À faire'}).length,ec=rows.filter(function(r){return r.statut==='🟠 En cours'}).length,ft=rows.filter(function(r){return r.statut==='✅ Fait'}).length,ht=rows.filter(function(r){return r.priorite==='🔥 Haute'&&r.statut!=='✅ Fait'}).length;
    h=kpi(af,'À faire')+kpi(ec,'En cours')+kpi(ht,'🔥 Prioritaires')+kpi(ft,'Faites');}
  $('#kpis').innerHTML=h;}
function kpi(v,l){return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}

/* ============ rendu ============ */
function render(){
  var T=TABS[cur],rows=applyFilterSort(DATA[cur]||[]);
  updateTabCounts();computeKpis();
  var l=$('#list');
  if(!rows.length){l.innerHTML='<div class="empty">Aucune ligne. Clique <b>➕ Ajouter</b>.</div>';return;}
  if(T.view==='kanban'){l.innerHTML=kanban(rows);bindKanban();return;}
  l.innerHTML=rows.map(card).join('');bind();
}
function phoneActs(tel,email,nm){var h='',wn=waNum(tel);
  if(tel){h+='<a class="ic tel" href="tel:'+esc(tel)+'" title="Appeler" onclick="event.stopPropagation()">📞</a><a class="ic wa" href="https://wa.me/'+wn+'" target="_blank" rel="noopener" title="WhatsApp" onclick="event.stopPropagation()">💬</a><a class="ic" href="sms:'+esc(tel)+'" title="SMS" onclick="event.stopPropagation()">✉️</a>';}
  if(email)h+='<a class="ic" href="mailto:'+esc(email)+'" title="Email" onclick="event.stopPropagation()">📧</a>';
  h+='<button class="ic ai" data-ai="'+esc(nm||'')+'|'+esc(tel||'')+'" title="Message" onclick="event.stopPropagation()">🤖</button>';return h;}
function card(r){if(cur==='prospects')return cardP(r);if(cur==='contrats')return cardC(r);return cardT(r);}
function cardP(r){var T=TABS.prospects;
 return '<div class="card2" data-id="'+r.id+'"><div class="r1"><div><div class="nm">'+esc(r.nom||'—')+'</div><div class="sub">'+esc(r.dirigeant||'')+(r.ville?' · '+esc(r.ville):'')+(r.appelePar?' · <b>'+esc(r.appelePar)+'</b>':'')+'</div></div><div class="acts">'+phoneActs(r.tel,r.email,r.nom)+'</div></div>'
  +'<div class="r2" onclick="event.stopPropagation()"><label class="chk"><input type="checkbox" data-f="Appelé" '+(r.appele?'checked':'')+'> Appelé</label>'
  +'<select data-f="Intérêt"><option value="">Intérêt…</option>'+opt(T.interetOpts,r.interet)+'</select>'
  +'<select data-f="Statut prospection">'+opt(T.statutOpts,r.statut)+'</select>'
  +'<span class="savepill">✓</span></div></div>';}
function cardC(r){var T=TABS.contrats;
 return '<div class="card2" data-id="'+r.id+'"><div class="r1"><div><div class="nm">'+esc(r.apprenant||'—')+'</div><div class="sub">'+esc(r.entreprise||'')+(r.montant?' · <b>'+Number(r.montant).toLocaleString("fr-FR")+' €</b>':'')+(r.financeur?' · '+esc(r.financeur):'')+'</div></div><div class="acts"><span class="tagpill">'+esc(r.statut||'')+'</span></div></div>'
  +'<div class="r2" onclick="event.stopPropagation()"><select data-f="Statut">'+opt(T.statutOpts,r.statut)+'</select><span class="savepill">✓</span></div></div>';}
function cardT(r){var T=TABS.taches;
 return '<div class="card2" data-id="'+r.id+'"><div class="r1"><div><div class="nm">'+esc(r.tache||'—')+'</div><div class="sub">'+esc(r.dossier||'')+(r.assigne?' · <b>'+esc(r.assigne)+'</b>':'')+'</div></div><div class="acts"><span class="tagpill">'+esc(r.priorite||'')+'</span></div></div>'
  +'<div class="r2" onclick="event.stopPropagation()"><select data-f="Statut">'+opt(T.statutOpts,r.statut)+'</select><select data-f="Assigné à"><option value="">Assigner…</option>'+opt(T.assigneOpts,r.assigne)+'</select><span class="savepill">✓</span></div></div>';}
function bind(){
  document.querySelectorAll('.card2').forEach(function(c){var id=c.getAttribute('data-id');
    c.addEventListener('click',function(){openDrawer(id);});
    c.querySelectorAll('select').forEach(function(s){s.addEventListener('change',function(e){e.stopPropagation();autoMe(id);save(id,s.getAttribute('data-f'),s.value,c.querySelector('.savepill'));});});
    c.querySelectorAll('input[type=checkbox]').forEach(function(cb){cb.addEventListener('change',function(e){e.stopPropagation();autoMe(id);save(id,cb.getAttribute('data-f'),cb.checked,c.querySelector('.savepill'));});});
    var ai=c.querySelector('[data-ai]');if(ai)ai.addEventListener('click',function(e){e.stopPropagation();aiMsg(ai.getAttribute('data-ai'));});
  });
}
function autoMe(id){ // auto-remplit "Appelé par" / "Assigné à" avec ME si vide
  if(!ME||!LIVE)return;var rec=(DATA[cur]||[]).filter(function(r){return r.id===id})[0];if(!rec)return;
  if(cur==='prospects'&&!rec.appelePar){save(id,'Appelé par',ME);}
}
/* kanban */
function kanban(rows){var T=TABS[cur],cols=T.statutOpts;
 return '<div class="kanban">'+cols.map(function(col){var rs=rows.filter(function(r){return r.statut===col;});
  return '<div class="kcol"><h4>'+esc(col)+' <span>'+rs.length+'</span></h4>'+rs.map(function(r){return kcard(r);}).join('')+'</div>';
 }).join('')+'</div>';}
function kcard(r){var nm=r.nom||r.apprenant||r.tache||'—';var sub=(r.ville||r.entreprise||r.dossier||'');
 return '<div class="kc" data-id="'+r.id+'"><div class="knm">'+esc(nm)+'</div><div class="ksub">'+esc(sub)+'</div>'
  +(r.tel?'<div class="kacts">'+phoneActs(r.tel,r.email,nm)+'</div>':'')+'</div>';}
function bindKanban(){document.querySelectorAll('.kc').forEach(function(c){var id=c.getAttribute('data-id');
  c.addEventListener('click',function(){openDrawer(id);});
  c.querySelectorAll('[data-ai]').forEach(function(a){a.addEventListener('click',function(e){e.stopPropagation();aiMsg(a.getAttribute('data-ai'));});});});}

/* ============ drawer détail ============ */
function openDrawer(id){var rec=(DATA[cur]||[]).filter(function(r){return r.id===id})[0];if(!rec)return;var T=TABS[cur];
 var title=rec.nom||rec.apprenant||rec.tache||'Fiche';
 var sub=(rec.dirigeant||rec.entreprise||rec.dossier||'')+(rec.ville?' · '+rec.ville:'');
 var h='<button class="x" onclick="closeDrawer()">×</button><h3>'+esc(title)+'</h3><div class="dsub">'+esc(sub)+'</div>';
 if(rec.tel)h+='<div class="dact">'+phoneActs(rec.tel,rec.email,title)+'</div>';
 var fieldDefs={
   nom:['Entreprise','text'],tel:['Téléphone','text'],email:['Email','text'],dirigeant:['Dirigeant','text'],ville:['Ville','text'],
   statut:['Statut','select',T.statutOpts],interet:['Intérêt','select',T.interetOpts],appelePar:['Appelé par','select',T.agentOpts],agent:['Propriétaire','select',T.agentOpts],
   apprenant:['Apprenant','text'],entreprise:['Entreprise','text'],financeur:['Financeur','select',T.financeurOpts],montant:['Montant (€)','text'],note:['Blocage / note','area'],
   tache:['Tâche','text'],assigne:['Assigné à','select',T.assigneOpts],priorite:['Priorité','select',T.prioriteOpts],dossier:['Dossier lié','text'],notes:['Notes','area']
 };
 Object.keys(T.cols).forEach(function(k){if(k==='appele')return;var def=fieldDefs[k];if(!def)return;var v=rec[k]==null?'':rec[k];
   h+='<label>'+def[0]+'</label>';
   if(def[1]==='select')h+='<select data-dk="'+k+'"><option value=""></option>'+opt(def[2],v)+'</select>';
   else if(def[1]==='area')h+='<textarea data-dk="'+k+'" rows="3">'+esc(v)+'</textarea>';
   else h+='<input type="text" data-dk="'+k+'" value="'+esc(v)+'">';
 });
 // commentaire rapide
 var noteKey=(cur==='prospects'?'notes':(cur==='contrats'?'note':'notes'));var noteField=T.cols[noteKey];
 h+='<label>➕ Ajouter un commentaire (pendant l\'appel)</label><textarea id="dNote" rows="2" placeholder="Ce qui s\'est dit, prochaine action…"></textarea><button class="btnadd" id="dNoteSave" style="margin-top:7px;padding:9px 14px">Ajouter au dossier</button>';
 $('#drawer').innerHTML=h;$('#drawer').classList.add('on');
 $('#drawer').querySelectorAll('[data-dk]').forEach(function(el){el.addEventListener('change',function(){var k=el.getAttribute('data-dk');var val=el.value;if(k==='montant')val=Number(String(val).replace(/[^0-9.]/g,''))||'';save(id,T.cols[k],val);});});
 $('#dNoteSave').addEventListener('click',function(){var ta=$('#dNote');if(!ta.value.trim())return;var old=rec[noteKey]||'';var val='['+today()+(ME?' '+ME:'')+'] '+ta.value.trim()+(old?'\n'+old:'');save(id,noteField,val).then(function(){rec[noteKey]=val;toast('💬 Commentaire ajouté');ta.value='';});});
}
function closeDrawer(){$('#drawer').classList.remove('on');}

/* ============ message assistant ============ */
function aiMsg(data){var p=data.split('|'),nm=p[0]||'',tel=p[1]||'';var wn=waNum(tel);
 var msgs=[['Prise de contact','Bonjour, je vous contacte de la part de Paris Sud Formation (organisme habilité OPCO Mobilités). On accompagne les dirigeants du transport à piloter avec l\'IA — 100% financé, 0 € pour vous. 2 minutes cette semaine ?'],
  ['Relance douce','Bonjour, je reviens vers vous : vous avez une enveloppe formation OPCO (~1 500 €) à débloquer en 2 semaines. On cale 30 min d\'audit gratuit avec Abdel ?'],
  ['Confirmation RDV','Bonjour, petit rappel de notre audit IA (30 min, visio). Rien à préparer, on regarde vos droits OPCO + 2-3 usages concrets. À tout à l\'heure !']];
 var h='<h3>🤖 Message pour '+esc(nm||'ce contact')+'</h3>';
 msgs.forEach(function(m,i){h+='<label>'+m[0]+'</label><textarea id="m'+i+'" rows="4">'+esc(m[1])+'</textarea><div style="display:flex;gap:8px;margin:6px 0 10px">'+(wn?'<a class="btnadd" style="text-decoration:none;text-align:center;flex:1" target="_blank" rel="noopener" href="https://wa.me/'+wn+'" data-wa="'+i+'">💬 WhatsApp</a>':'')+'<button class="btncfg" data-copy="'+i+'" style="flex:1">Copier</button></div>';});
 openModal(h);
 document.querySelectorAll('[data-copy]').forEach(function(b){b.addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('m'+b.getAttribute('data-copy')).value);b.textContent='Copié ✓';});});
 document.querySelectorAll('[data-wa]').forEach(function(a){a.addEventListener('click',function(){a.href='https://wa.me/'+wn+'?text='+encodeURIComponent(document.getElementById('m'+a.getAttribute('data-wa')).value);});});
}

/* ============ ajouter ============ */
function openAdd(){var T=TABS[cur],fields;
 if(cur==='prospects')fields=[['Entreprise','nom','text'],['Téléphone','telephone','text'],['Email','email','text'],['Dirigeant','dirigeants','text'],['Ville','ville','text'],['Canal d\'acquisition','Source base','select',['LinkedIn','WhatsApp','Cold mail','Téléphone','Site web','Salon / réseau','Recommandation']],['Notes','Notes prospect','area']];
 else if(cur==='contrats')fields=[['Apprenant','Apprenant','text'],['Entreprise','Entreprise','text'],['Financeur','Financeur','select',T.financeurOpts],['Montant (€)','Montant convention','text'],['Statut','Statut','select',T.statutOpts],['Note','Blocage / note','area']];
 else fields=[['Tâche','Tâche','text'],['Assigné à','Assigné à','select',T.assigneOpts],['Priorité','Priorité','select',T.prioriteOpts],['Statut','Statut','select',T.statutOpts],['Dossier lié','Dossier lié','text'],['Notes','Notes','area']];
 var h='<h3>➕ Ajouter</h3>';fields.forEach(function(f,i){h+='<label>'+f[0]+'</label>';if(f[2]==='select')h+='<select id="af'+i+'"><option value=""></option>'+opt(f[3],'')+'</select>';else if(f[2]==='area')h+='<textarea id="af'+i+'" rows="2"></textarea>';else h+='<input id="af'+i+'" type="text">';});
 h+='<div class="go"><button class="ok" id="addok">Créer</button><button class="no" id="addno">Annuler</button></div>';openModal(h);
 $('#addno').addEventListener('click',closeModal);
 $('#addok').addEventListener('click',function(){var payload={};fields.forEach(function(f,i){var v=document.getElementById('af'+i).value.trim();if(v)payload[f[1]]=v;});
   if(cur==='contrats'&&payload['Montant convention'])payload['Montant convention']=Number(payload['Montant convention'].replace(/[^0-9.]/g,''))||undefined;
   if(cur==='prospects'){if(!payload['Statut prospection'])payload['Statut prospection']='À appeler';if(ME&&!payload['Agent'])payload['Agent']=ME;}
   if(!LIVE){toast('⚠️ Connecte le CRM (⚙️) pour créer');return;}
   $('#addok').textContent='…';createRow(T.table,payload).then(function(){closeModal();refresh();toast('✅ Ajouté');}).catch(function(e){toast('Erreur: '+e.message);$('#addok').textContent='Créer';});});
}

/* ============ config ============ */
function openCfg(){var h='<h3>⚙️ Connexion CRM</h3><label>URL du proxy</label><input id="cApi" type="text" value="'+esc(CFG.api)+'"><label>Clé CRM</label><input id="cKey" type="text" placeholder="votre clé secrète" value="'+esc(CFG.key)+'"><div class="go"><button class="ok" id="cSave">Connecter</button><button class="no" id="cNo">Fermer</button></div>';openModal(h);
 $('#cNo').addEventListener('click',closeModal);
 $('#cSave').addEventListener('click',function(){CFG.api=$('#cApi').value.trim();CFG.key=$('#cKey').value.trim();localStorage.setItem('crm_api',CFG.api);localStorage.setItem('crm_key',CFG.key);LIVE=!!(CFG.api&&CFG.key);setConn();closeModal();refresh();toast(LIVE?'✅ Connecté':'Aperçu');});}
function openModal(h){$('#modal').innerHTML=h;$('#ov').classList.add('on');}
function closeModal(){$('#ov').classList.remove('on');}
$('#ov').addEventListener('click',function(e){if(e.target===$('#ov'))closeModal();});

/* ============ barre / tabs ============ */
function buildTabs(){$('#tabs').innerHTML=Object.keys(TABS).map(function(k){return '<button class="crmtab'+(k===cur?' on':'')+'" data-t="'+k+'">'+TABS[k].label+' <span class="b" id="cnt-'+k+'">·</span></button>';}).join('')
  +'<span class="me">👤 <select id="meSel"><option value="">Je suis…</option>'+opt(['Agente 1','Agente 2','Abdel','Souleyman'],ME)+'</select></span>';
 $('#tabs').querySelectorAll('.crmtab').forEach(function(b){b.addEventListener('click',function(){cur=b.getAttribute('data-t');filter='';chip='';$('#search').value='';buildChips();buildSort();$('#tabs').querySelectorAll('.crmtab').forEach(function(x){x.classList.remove('on')});b.classList.add('on');setView();if(DATA[cur])render();else refresh();});});
 $('#meSel').addEventListener('change',function(){ME=this.value;localStorage.setItem('crm_me',ME);toast('👤 Vous êtes : '+(ME||'—'));});}
function updateTabCounts(){Object.keys(TABS).forEach(function(k){var el=document.getElementById('cnt-'+k);if(el&&DATA[k])el.textContent=DATA[k].length;});}
function buildChips(){$('#chips').innerHTML=(CHIPS[cur]||[]).map(function(c){return '<button class="chip'+(c[0]===chip?' on':'')+'" data-c="'+esc(c[0])+'">'+esc(c[1])+'</button>';}).join('');
 $('#chips').querySelectorAll('.chip').forEach(function(b){b.addEventListener('click',function(){chip=b.getAttribute('data-c');buildChips();render();});});}
function buildSort(){$('#sort').innerHTML='<option value="">Trier…</option>'+opt(SORTS[cur]||[],sortBy);}
function setView(){$('.vtog').querySelectorAll('button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===TABS[cur].view);});}

/* ============ init ============ */
$('#search').addEventListener('input',function(){filter=this.value;render();});
$('#sort').addEventListener('change',function(){sortBy=this.value;render();});
$('.vtog').querySelectorAll('button').forEach(function(b){b.addEventListener('click',function(){TABS[cur].view=b.getAttribute('data-v');setView();render();});});
$('#add').addEventListener('click',openAdd);
$('#cfg').addEventListener('click',openCfg);
buildTabs();buildChips();buildSort();setView();
loadSnap().then(refresh);
</script>
</body></html>
